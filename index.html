<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>武蔵野 生産性管理 v6.5</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
       /* Google Fontsから丸ゴシックを読み込み */
@import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap');

html, body { 
    overscroll-behavior: none; /* ←★上下左右すべての引っ張りを禁止！ */
}

body { 
    font-family: 'M PLUS Rounded 1c', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; 
    margin: 8px; 
    background-color: #fffefa; 
    color: #333; 
    font-size: 14px; 
    line-height: 1.2; 
    padding-bottom: 100px; 
}
        
        /* 並べ替えモード時のスタイル */
        .reorder-active .line-container { border: 1.5px dashed #007bff; opacity: 0.9; }
        .drag-handle { 
            display: none; width: 30px; height: 30px; 
            background: #eee; border-radius: 4px; 
            align-items: center; justify-content: center; 
            font-size: 20px; color: #666; cursor: grab; margin-right: 5px;
        }
        .reorder-active .drag-handle { display: flex; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; border-bottom: 1px solid #eee; padding-bottom: 2px; }
        .line-info { display: flex; align-items: center; gap: 4px; flex-grow: 1; overflow: hidden; }
        
        .toggle-btn { 
            font-size: 12px; color: #444; background: #f8f8f8; 
            border: 1px solid #ddd; border-radius: 4px;
            width: 28px; height: 28px; 
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0;
        }
        
        .line-title { 
            font-size: 13px; font-weight: bold; color: #007bff; 
            text-decoration: underline; white-space: nowrap; 
            overflow: hidden; text-overflow: ellipsis; 
            max-width: 90px; cursor: pointer; padding: 2px 0;
        }
        
        .status-badge { padding: 1px 3px; border-radius: 3px; font-weight: bold; font-size: 9px; border: 1.2px solid; }
        .avg-badge { border-color: #28a745; color: #28a745; background: #fafffa; }
        
        :root { --ctrl-height: 36px; }
        .controls { display: flex; align-items: center; gap: 4px; margin-bottom: 4px; }
        input[type="number"], .modal-input { width: 90px; padding: 0 6px; border: 2px solid #007bff; border-radius: 4px; font-size: 16px; font-weight: bold; height: var(--ctrl-height); box-sizing: border-box; }
        .modal-input { width: 100%; margin-bottom: 15px; }
        .btn-record { padding: 0 10px; border-radius: 4px; border: none; font-size: 13px; font-weight: bold; background: #28a745; color: white; height: var(--ctrl-height); }
        .prediction-display { flex-grow: 1; background: #fff9db; border: 1.5px solid #fab005; border-radius: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; height: var(--ctrl-height); }
        .eta-time { font-size: 14px; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 1px; table-layout: fixed; border: 1px solid #eee; }
        th, td { border: 1px solid #eee; padding: 0px 1px; text-align: center; height: 24px; line-height: 24px; }
        th { background: #f8f8f8; font-size: 8px; color: #999; height: 18px; line-height: 18px; }
        td { font-size: 12px; }
        .editable { color: #007bff; text-decoration: dotted underline; cursor: pointer; font-weight: bold; }
        .btn-row-del { color: #bbb; background: none; border: none; font-size: 16px; cursor: pointer; padding: 0; display: block; width: 100%; height: 100%; }
        
        .line-body { display: block; margin-top: 4px; }
        .line-container.collapsed .line-body { display: none; }
        .line-container.collapsed { border-left-color: #ccc; background: #fafafa; margin-bottom: 4px; }

        .top-btns { display: flex; gap: 4px; margin-bottom: 6px; }
        .btn-blue { background: #007bff; color: white; flex: 2; padding: 10px; font-size: 13px; font-weight: bold; border-radius: 4px; border:none; }
        .btn-reorder-toggle { background: #666; color: white; flex: 1; padding: 10px; font-size: 11px; font-weight: bold; border-radius: 4px; border:none; }
        .btn-reorder-toggle.active { background: #f39c12; color: white; }

        .btn-orange, .btn-gray, .btn-red { color: white; border:none; border-radius:3px; padding:4px 6px; font-size: 10px; font-weight: bold; }
        .btn-orange { background: #f39c12; }
        .btn-gray { background: #666; }
        .btn-red { background: #dc3545; }
        
        .system-footer { margin-top: 40px; border-top: 1px dashed #ccc; padding: 15px 5px; text-align: center; }
        .credit { font-size: 11px; color: #777; margin-bottom: 10px; font-style: italic; }
        .btn-full-reset { background: #f03e3e; color: white; padding: 10px; border-radius: 6px; font-size: 11px; width: 90%; border: none; font-weight: bold; opacity: 0.7; }

        #customModalOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 9999; justify-content: center; align-items: center; }
        .modal-card { background: white; width: 85%; max-width: 320px; padding: 20px; border-radius: 12px; text-align: center; }
        .modal-title { font-weight: bold; font-size: 15px; margin-bottom: 8px; color: #333; }
        .modal-text { font-size: 13px; margin-bottom: 15px; line-height: 1.4; color: #666; }
        .modal-btns { display: flex; gap: 10px; }
        .modal-btns button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; font-size: 13px; }
    </style>
</head>
<body>

<div class="top-btns">
    <button class="btn-blue" onclick="openInputModal('新しいライン名を入力', '', (val) => { addNewLine(val) })">＋ 新ライン追加</button>
    <button id="reorderBtn" class="btn-reorder-toggle" onclick="toggleReorderMode()">⇅ 並べ替え</button>
</div>

<div id="linesContainer"></div>

<div class="system-footer">
    <div class="credit">Developed by: 埼玉工場 加工1F 西</div>
    <button class="btn-full-reset" onclick="startFullResetFlow()">⚠️ 全データを完全削除（初期化）</button>
</div>

<div id="customModalOverlay" onclick="closeModal()">
    <div class="modal-card" onclick="event.stopPropagation()">
        <div id="modalTitle" class="modal-title">確認</div>
        <div id="modalText" class="modal-text"></div>
        <div id="modalInputArea" style="display:none;">
            <input type="text" id="modalInput" class="modal-input">
        </div>
        <div class="modal-btns">
            <button style="background:#eee;" onclick="closeModal()">戻る</button>
            <button id="modalConfirmBtn" style="background:#007bff; color:white;">実行</button>
        </div>
    </div>
</div>

<script>
    let dataStore = JSON.parse(localStorage.getItem('lineAppData')) || {};
    let lineOrder = JSON.parse(localStorage.getItem('lineAppOrder')) || [];
    let sortableInstance = null;
    let isReorderMode = false;

    window.onload = function() { refreshList(); initSortable(); };
    function saveData() { localStorage.setItem('lineAppData', JSON.stringify(dataStore)); localStorage.setItem('lineAppOrder', JSON.stringify(lineOrder)); }

    function toggleReorderMode() {
        isReorderMode = !isReorderMode;
        const btn = document.getElementById('reorderBtn');
        const container = document.getElementById('linesContainer');
        
        if (isReorderMode) {
            btn.classList.add('active');
            btn.innerText = "✓ 完了";
            container.classList.add('reorder-active');
            sortableInstance.option('disabled', false);
        } else {
            btn.classList.remove('active');
            btn.innerText = "⇅ 並べ替え";
            container.classList.remove('reorder-active');
            sortableInstance.option('disabled', true);
            saveData();
        }
    }

    function initSortable() {
        const el = document.getElementById('linesContainer');
        sortableInstance = Sortable.create(el, { 
            handle: '.drag-handle', // ハンドル部分のみ反応させる
            animation: 150, 
            disabled: true, // 最初は無効化
            onEnd: function() { 
                lineOrder = Array.from(el.querySelectorAll('.line-container')).map(item => item.id); 
            } 
        });
    }

    // モーダル・ロジック
    function openConfirmModal(title, text, confirmColor, callback) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalText').innerText = text;
        document.getElementById('modalInputArea').style.display = 'none';
        const btn = document.getElementById('modalConfirmBtn');
        btn.style.background = confirmColor;
        btn.onclick = () => { callback(); closeModal(); };
        document.getElementById('customModalOverlay').style.display = 'flex';
        history.pushState({modal: true}, "");
    }

    function openInputModal(title, defaultVal, callback) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalText').innerText = "";
        document.getElementById('modalInputArea').style.display = 'block';
        const input = document.getElementById('modalInput');
        input.value = defaultVal;
        const btn = document.getElementById('modalConfirmBtn');
        btn.style.background = "#007bff";
        btn.onclick = () => { if(input.value) { callback(input.value); closeModal(); } };
        document.getElementById('customModalOverlay').style.display = 'flex';
        setTimeout(() => input.focus(), 100);
        history.pushState({modal: true}, "");
    }

    function closeModal() { document.getElementById('customModalOverlay').style.display = 'none'; if(history.state && history.state.modal) history.back(); }
    window.onpopstate = () => document.getElementById('customModalOverlay').style.display = 'none';

    function addNewLine(name) { 
        const id = 'line-' + Date.now();
        dataStore[id] = { name: name, started: false, logs: [], targetTime: "", collapsed: false };
        lineOrder.unshift(id); saveData(); refreshList();
    }

    function renderLine(id, data) {
        const isCollapsed = data.collapsed ? 'collapsed' : '';
        const icon = data.collapsed ? '▼' : '▲';
        const html = `
            <div class="line-container ${isCollapsed}" id="${id}">
                <header>
                    <div class="line-info">
                        <div class="drag-handle">⠿</div>
                        <div class="toggle-btn" onclick="toggleCollapse('${id}')">${icon}</div>
                        <span class="line-title" onclick="openInputModal('名前を変更', '${data.name}', (val)=>{ dataStore['${id}'].name=val; saveData(); refreshList(); })">${data.name}</span>
                    </div>
                    <div style="display:flex; gap:3px;">
                        <div class="status-badge avg-badge">平均:<span id="${id}-headTotal">0.0</span></div>
                        <button class="btn-orange" onclick="toggleTarget('${id}')">目標</button>
                        <button class="btn-gray" onclick="openConfirmModal('リセット', 'このラインをリセットしますか？', '#666', ()=>{ dataStore['${id}'].started=false; dataStore['${id}'].logs=[]; saveData(); refreshList(); })">リセット</button>
                        <button class="btn-red" onclick="openConfirmModal('削除', 'このライン自体を削除しますか？', '#dc3545', ()=>{ delete dataStore['${id}']; lineOrder=lineOrder.filter(l=>l!=='${id}'); saveData(); refreshList(); })">削除</button>
                    </div>
                </header>
                <div class="line-body">
                    <div id="${id}-setup" class="controls" style="display: ${data.started ? 'none' : 'flex'}">
                        <input type="number" id="${id}-startInput" placeholder="開始残数" pattern="\\d*" style="flex-grow:1;">
                        <button class="btn-blue" style="width:auto; margin:0; height:36px; padding:0 15px;" onclick="startLine('${id}')">開始</button>
                    </div>
                    <div id="${id}-main" style="display: ${data.started ? 'block' : 'none'}">
                        <div id="${id}-targetSetup" class="target-setup-area" style="display:none; background:#fffbe6; padding:4px; margin-bottom:4px; border-radius:4px; align-items:center; justify-content:center; gap:4px;">
                            <input type="time" id="${id}-targetInput" value="${data.targetTime || ''}" onchange="setTargetTime('${id}', this.value)">
                            <button class="btn-gray" onclick="setTargetTime('${id}', '')" style="padding:4px 8px">目標解除</button>
                        </div>
                        <div class="controls">
                            <input type="number" id="${id}-currInput" placeholder="残数" pattern="\\d*">
                            <button class="btn-record" onclick="record('${id}')">記録</button>
                            <div class="prediction-display">
                                <span style="font-size:7px;">終了予測</span>
                                <span class="eta-time" id="${id}-eta">--:--</span>
                            </div>
                        </div>
                        <table>
                            <thead><tr><th width="35%">時間</th><th width="25%">残数</th><th width="25%">個/h</th><th width="15%">削除</th></tr></thead>
                            <tbody id="${id}-log"></tbody>
                        </table>
                    </div>
                </div>
            </div>`;
        document.getElementById('linesContainer').insertAdjacentHTML('beforeend', html);
        if (data.started) refreshLineOnly(id);
    }

    function toggleCollapse(id) {
        dataStore[id].collapsed = !dataStore[id].collapsed;
        saveData();
        const el = document.getElementById(id);
        const icon = el.querySelector('.toggle-btn');
        if (dataStore[id].collapsed) { el.classList.add('collapsed'); icon.innerText = '▼'; }
        else { el.classList.remove('collapsed'); icon.innerText = '▲'; }
    }

    function setTargetTime(id, val) { dataStore[id].targetTime = val; saveData(); updateStats(id); }
    function toggleTarget(id) { const el = document.getElementById(id + '-targetSetup'); el.style.display = (el.style.display === 'flex') ? 'none' : 'flex'; }
    function startLine(id) { const input = document.getElementById(id + '-startInput'); const val = parseInt(input.value); if (isNaN(val)) return; dataStore[id].started = true; dataStore[id].logs = [{ rem: val, ts: Date.now() }]; saveData(); refreshLineOnly(id); document.getElementById(id + '-setup').style.display = 'none'; document.getElementById(id + '-main').style.display = 'block'; }
    function record(id) { const input = document.getElementById(id + '-currInput'); const curr = parseInt(input.value); if (isNaN(curr)) return; dataStore[id].logs.push({ rem: curr, ts: Date.now() }); saveData(); refreshLineOnly(id); input.value = ""; }
 // 各入力欄でEnterキー（確定）が押された時の処理
document.addEventListener('keypress', function (e) {
    if (e.key === 'Enter') {
        const activeEl = document.activeElement;
        // もし今、残数入力欄（currInput）にフォーカスがあれば
        if (activeEl && activeEl.id.endsWith('-currInput')) {
            const lineId = activeEl.id.replace('-currInput', '');
            record(lineId); // 記録を実行
            activeEl.blur(); // キーボードを閉じる（連続入力したい場合はここを消す）
        }
        // もし開始残数入力欄（startInput）にフォーカスがあれば
        if (activeEl && activeEl.id.endsWith('-startInput')) {
            const lineId = activeEl.id.replace('-startInput', '');
            startLine(lineId); // 開始を実行
        }
    }
});
    function refreshLineOnly(id) {
        const ds = dataStore[id]; const tbody = document.getElementById(id + '-log'); tbody.innerHTML = "";
        ds.logs.forEach((log, i) => {
            let timeDisp = `<span class="editable" onclick="openInputModal('時間の修正', '${fmtTime(new Date(log.ts))}', (v)=>{ editRowTime('${id}', ${i}, v) })">${fmtTime(new Date(log.ts))}</span>`;
            let remDisp = `<span class="editable" onclick="openInputModal('残数の修正', '${log.rem}', (v)=>{ dataStore['${id}'].logs[${i}].rem=parseInt(v); saveData(); refreshLineOnly('${id}'); })">${log.rem}</span>`;
            let rate = i > 0 ? ((ds.logs[i-1].rem - ds.logs[i].rem) / ((ds.logs[i].ts - ds.logs[i-1].ts) / 3600000)).toFixed(1) : "-";
            tbody.insertAdjacentHTML('afterbegin', `<tr><td>${timeDisp}</td><td>${remDisp}</td><td style="font-weight:bold;color:#d9534f">${rate}</td><td><button class="btn-row-del" onclick="openConfirmModal('行の削除', 'この行を削除しますか？', '#666', ()=>{ dataStore['${id}'].logs.splice(${i}, 1); if(dataStore['${id}'].logs.length===0)dataStore['${id}'].started=false; saveData(); refreshList(); })">×</button></td></tr>`);
        });
        updateStats(id);
    }

    function editRowTime(id, index, input) {
        const p = input.split(/[:：]/);
        const d = new Date(dataStore[id].logs[index].ts);
        d.setHours(p[0], p[1]);
        dataStore[id].logs[index].ts = d.getTime();
        dataStore[id].logs.sort((a,b)=>a.ts-b.ts);
        saveData(); refreshLineOnly(id);
    }

    function updateStats(id) {
        const ds = dataStore[id]; if (!ds.started || ds.logs.length === 0) return;
        const last = ds.logs[ds.logs.length-1]; const avg = (ds.logs[0].rem - last.rem) / ((last.ts - ds.logs[0].ts) / 3600000);
        document.getElementById(id+'-headTotal').innerText = isFinite(avg) ? avg.toFixed(1) : "0.0";
        document.getElementById(id+'-eta').innerText = avg > 0 ? fmtTime(new Date(last.ts + (last.rem / avg) * 3600000)) : "--:--";
    }

    function startFullResetFlow() {
        openConfirmModal("【最終確認】", "全てのデータを削除して初期化します。よろしいですか？", "#d63031", () => {
            localStorage.clear(); dataStore = {}; lineOrder = []; saveData(); refreshList();
        });
    }

    function refreshList() { document.getElementById('linesContainer').innerHTML = ""; lineOrder.forEach(id => renderLine(id, dataStore[id])); }
    function fmtTime(d) { return d.getHours() + ":" + d.getMinutes().toString().padStart(2, '0'); }
</script>
</body>
</html>
